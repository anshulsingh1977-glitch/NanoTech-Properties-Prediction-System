<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Register — Nanotech Properties</title><link rel="stylesheet" href="styles.css"></head>
<body>
  <div class="navbar">
    <div class="brand"><img src="5742b17f-782e-4e38-8477-e62b30fb2b2f.png" alt="logo"><h1>Nanotech Properties</h1></div>
    <div class="nav-links"><a href="login.html">Sign in</a></div>
  </div>

  <div class="hero">
    <div class="container auth-wrap">
      <div class="brand-block">
        <img src="5742b17f-782e-4e38-8477-e62b30fb2b2f.png" style="width:120px;height:120px" alt="logo">
        <h2>Create account</h2>
        <p>Join to save prediction history and upload batch CSVs.</p>
      </div>

      <div>
        <div class="form">
          <div style="margin-bottom:10px"><div class="label">Full name</div><input id="name" class="input" type="text" placeholder="Your name"></div>
          <div style="margin-bottom:10px"><div class="label">Email</div><input id="regEmail" class="input" type="email" placeholder="you@domain.com"></div>
          <div style="margin-bottom:10px"><div class="label">Password</div><input id="regPass" class="input" type="password" placeholder="••••••"></div>
          <div style="display:flex;gap:8px">
            <button class="btn" id="createBtn">Create account</button>
            <a class="btn secondary" href="login.html">Sign in</a>
          </div>
          <div class="footer" style="margin-top:10px">This demo stores only a simple identifier in browser localStorage.</div>
        </div>
      </div>
    </div>
  </div>

<script>
document.getElementById('createBtn').addEventListener('click', function(){
  const email = document.getElementById('regEmail').value || 'guest@nanotech';
  localStorage.setItem('nanotech_user', email);
  location.href = 'dashboard.html';
});
</script>
</body>
</html>
